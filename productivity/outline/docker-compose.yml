services:
  # --- Wiki ---
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    container_name: outline
    restart: always
    env_file: .env
    ports:
      - "3001:3000"
    depends_on:
      outline-pgsql:
        condition: service_healthy
      outline-redis:
        condition: service_healthy
      outline-minio:
        condition: service_started
    volumes:
      - /mnt/docker-data/productivity/outline:/var/lib/outline/data
      - ./outline-pgsql.crt:/etc/ssl/certs/db-ca.crt:ro
    environment:
      - PGSSLROOTCERT=/etc/ssl/certs/db-ca.crt.crt
    networks:
      - dockernet

  # --- Database ---
  outline-pgsql:
    image: postgres:15-alpine
    container_name: outline-pgsql
    restart: always
    secrets:
      - db_password
      - db_user
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: outline
    volumes:
      - /mnt/docker-data/productivity/outline-pgsql:/var/lib/postgresql/data
      - ./outline-pgsql.crt:/var/lib/postgresql/server.crt:ro
      - ./outline-pgsql.key:/var/lib/postgresql/server.key:ro
    command: "postgres -c ssl=on -c ssl_cert_file=/var/lib/postgresql/server.crt -c ssl_key_file=/var/lib/postgresql/server.key"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U outline -d outline" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dockernet

  # --- Cache ---
  outline-redis:
    image: redis:7-alpine
    container_name: outline-redis
    restart: always
    volumes:
      - /mnt/docker-data/productivity/outline-redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dockernet

  # --- Storage (S3 Compatible) ---
  outline-minio:
    image: minio/minio
    container_name: outline-minio
    restart: always
    command: server /data --console-address ":9001"
    secrets:
      - minio_root_user
      - minio_root_password
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    volumes:
      - /mnt/docker-data/productivity/outline-minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - dockernet

  # --- OIDC Provider ---
  outline-authelia:
    image: authelia/authelia:latest
    container_name: outline-authelia
    restart: always
    volumes:
      - /mnt/docker-data/productivity/outline-authelia:/config
    ports:
      - "9091:9091"
    networks:
      - dockernet
    environment:
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: '/run/secrets/authelia_jwt_secret'
      AUTHELIA_SESSION_SECRET_FILE: '/run/secrets/authelia_session_secret'
      AUTHELIA_STORAGE_POSTGRES_PASSWORD_FILE: '/run/secrets/authelia_storage_password'
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: '/run/secrets/authelia_storage_encryption_key'
    secrets:
      - authelia_jwt_secret
      - authelia_session_secret
      - authelia_storage_password
      - authelia_storage_encryption_key

networks:
  dockernet:
    external: true

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_user:
    file: ./secrets/db_user.txt
  minio_root_user:
    file: ./secrets/minio_root_user.txt
  minio_root_password:
    file: ./secrets/minio_root_password.txt
  authelia_jwt_secret:
    file: ./secrets/authelia_jwt_secret
  authelia_session_secret:
    file: ./secrets/authelia_session_secret
  authelia_storage_password:
    file: ./secrets/authelia_storage_password
  authelia_storage_encryption_key:
    file: ./secrets/authelia_storage_encryption_key
