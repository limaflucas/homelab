services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    command: --quiet --wiredTigerCacheSizeGB 0.25
    secrets:
      - db_password
      - db_user
    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/db_user
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - /mnt/docker-data/databases/mongodb/data:/data/db
      - /mnt/docker-data/databases/mongodb/config:/data/configdb
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - dockernet

networks:
  dockernet:
    external: true

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_user:
    file: ./secrets/db_user.txt